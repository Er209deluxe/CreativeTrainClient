<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Web/stylesheet.css" />
      <link rel="icon" type="image/x-icon" href="/TrainFavicon.ico">

    <title>Active Game</title>
</head>
<body>
    <div class="header">
        <div class="headerElement">
            <button>Guide book</button>
        </div>
        <div class="headerElement">
            <h1 id="timer"></h1>
        </div>
        <div class="headerElement">
            <h1>🪙 <span id="coinCount">0</span></h1>
        </div>
    </div>
    <div id="Inventory">

    </div>
    <div id="Shop">

    </div>
    <button onclick="leaveSession()">
    Leave Game
</button>

<button onclick="loadInventory()">
    Refresh Inventory
</button>


<div id="playerPopup" class="popup hidden">
    <div class="popup-content">
        <h2 class="centerContent" id="gameResult">Game Result</h2>
        <div id="winner"></div>
        <div id="reason"></div>
        <div class="teams">
            
        <div class="team-section" id="KILLER">
            <h3 style="color:#d90408;">Killers</h3>
            <div class="player-list"></div>
        </div>

        <div class="team-section" id="CIVILIAN">
            <h3 style="color:#02d926;">Civilians</h3>
            <div class="player-list"></div>
        </div>

        <div class="team-section" id="NEUTRAL">
            <h3 style="color:#888;">Neutrals</h3>
            <div class="player-list"></div>
        </div>
        </div>
       

        <button onclick="closePopup()">Close</button>
    </div>
</div>
</body>

    <script src="/Web/ApiRequester.js?ts=1"></script>

</html>
