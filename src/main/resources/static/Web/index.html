<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Train Lobby</title>
     <link rel="icon" type="image/x-icon" href="/TrainFavicon.ico">

    <link rel="stylesheet" href="/Web/stylesheet.css" />
</head>

<body>

    <div id="transitionScreen" class="transition-screen"></div>

    <div class="centered">

        <!-- Main Panel -->
        <div class="main">

            <h1>Session Control</h1>

            <button onclick="generatePlayerQr()">
                Generate QR Code
            </button>

            <button id="startSessionButton"
                    onclick="startSession()"
                    style="display: none;">
                Host Session
            </button>

            <!-- Registration Section -->
            <div id="registrationSection">

                <button onclick="registerAndConnect()">
                    Register
                </button>

                <div class="checkboxRow">
                    <input type="checkbox" name="isHost" id="isHost">
                    <label for="isHost">I am the host</label>
                </div>

                <!-- Player UUID image upload -->
                <input
                    class="fileUpload"
                    type="file"
                    id="player-uuid"
                    accept="image/*"
                >

                <input
                    type="text"
                    id="player-name"
                    placeholder="Player Name"
                >

                <input
                    type="text"
                    id="register-session-uuid"
                    placeholder="Session UUID"
                >

            </div>

            <!-- Host Only Config -->
            <div id="hostConfigSection" style="display: none;">

                <label for="role-config-upload">
                    Upload Role Config JSON
                </label>

                <input
                    class="fileUpload"
                    type="file"
                    id="role-config-upload"
                    accept=".json,application/json"
                >

                <p id="role-config-status">
                    No JSON uploaded
                </p>

            </div>

            <div class="absoluteCenter">
                <img id="qrCode" alt="QR Code">
            </div>

        </div>

        <!-- User Panel -->
        <div id="currentUsers" class="currentUsers">

            <h3>Session UUID</h3>

            <p
                class="sessionDisplay"
                id="sessionUuidDisplay"
            >
                No session active
            </p>

            <button onclick="leaveSession()">Leave Game</button>

            <h3>Current Users</h3>

            <ul id="userList">
                <li>No users connected</li>
            </ul>

        </div>

    </div>

    <script src="/Web/ApiRequester.js"></script>

    <script>

        let uploadedRoleConfig = null;

        document
            .getElementById("role-config-upload")
            .addEventListener("change", async (event) => {

                const file = event.target.files[0];

                if (!file) {
                    return;
                }

                try {

                    const text = await file.text();

                    JSON.parse(text);

                    uploadedRoleConfig = text;

                    document.getElementById(
                        "role-config-status"
                    ).innerText =
                        `Loaded: ${file.name}`;

                    console.log(
                        "Role config loaded:",
                        uploadedRoleConfig
                    );

                } catch (err) {

                    uploadedRoleConfig = null;

                    document.getElementById(
                        "role-config-status"
                    ).innerText =
                        "Invalid JSON file";

                    console.error(err);
                }
            });

    </script>

</body>
</html>
