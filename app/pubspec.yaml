name: creativetrainclient
description: "A new Flutter project."

version: 1.0.0

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.1.0
  animated_splash_screen: ^1.3.0
  m3e_buttons: ^0.0.3
  font_awesome_flutter: ^11.0.0
  m3e_collection: ^0.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  image_path: "assets/images/icon.png"
  android: true
  web:
    generate: true
  windows:
    generate: true
    icon_size: 48
  macos:
    generate: true
  linux:
    generate: true  
  ios: true 